name: release

# Builds and publishes the gateway + browser Docker images to GHCR on a `v*` tag.
# A gate job (check + unit tests) runs first; images publish only if it passes.
# On a dry-run (workflow_dispatch) the images are built but not pushed, so the
# release plumbing can be validated without cutting a tag.
#
# All actions are pinned by commit SHA (supply-chain hardening); versions + dates
# are recorded in docs/dependency-ledger.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm test

  images:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta-gateway
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/edictum-ai/captatum
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short
      - id: meta-browser
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/edictum-ai/captatum-browser
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short
      # Gateway image — no browser binary (Tier-3 uses the sidecar over CDP), so it
      # stays small and keeps Chromium out of the gateway's blast radius.
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
      # Browser sidecar image — the long-lived Chromium the gateway connects to.
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile.browser
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-browser.outputs.tags }}
          labels: ${{ steps.meta-browser.outputs.labels }}
