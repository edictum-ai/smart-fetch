name: release

# Builds and publishes the gateway + browser Docker images to GHCR on a `v*` tag,
# and publishes the npm package @edictum/captatum via Trusted Publishing (OIDC,
# passwordless — no NPM_TOKEN). A gate job (check + unit tests) runs first;
# everything publishes only if it passes. On a dry-run (workflow_dispatch) the
# images are built but not pushed.
#
# All actions are pinned by commit SHA (supply-chain hardening); versions + dates
# are recorded in docs/dependency-ledger.md. The npm job requires a Trusted
# Publisher configured on npmjs.com (org: edictum-ai, repo: captatum, workflow:
# release.yml); the npm CLI auto-exchanges the GitHub OIDC token.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm test

  images:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta-gateway
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/edictum-ai/captatum
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short
      - id: meta-browser
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/edictum-ai/captatum-browser
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short
      # Gateway image — no browser binary (Tier-3 uses the sidecar over CDP), so it
      # stays small and keeps Chromium out of the gateway's blast radius.
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
      # Browser sidecar image — the long-lived Chromium the gateway connects to.
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile.browser
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-browser.outputs.tags }}
          labels: ${{ steps.meta-browser.outputs.labels }}

  # Publish @edictum/captatum to npm via Trusted Publishing (OIDC, passwordless).
  # Requires the trusted publisher configured on npmjs.com for this package:
  # GitHub Actions — org: edictum-ai, repo: captatum, workflow: release.yml.
  # The npm CLI (>=11.5.1) auto-exchanges the GitHub OIDC token when
  # id-token: write is granted — no NPM_TOKEN secret needed. Provenance is
  # automatic for OIDC from public repos.
  npm:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build        # compile src/*.ts → dist/*.js (Node won't type-strip .ts in node_modules)
      - run: npm publish --access public --provenance
