name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # TODO: pin actions by commit SHA (see edictum-ai/qratum) for full supply-chain
      # hardening; version tags used initially.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check      # syntax + 250-line limit + typecheck
      - run: pnpm test           # node --test test/*.test.ts (unit suite; no browser)
