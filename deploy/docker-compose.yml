# Captatum self-host (hosted flavor) — gateway + browser sidecar + SQLite volume.
# This is the COMMON base for EC2 / Mac Mini / any Docker host.
#
# Trust model: the gateway is the ONLY container with OAuth keys and the SQLite
# file. The browser sidecar shares the GATEWAY's network namespace
# (network_mode: service:gateway), so its loopback-only CDP is reachable from the
# gateway as 127.0.0.1:9222 — exactly the ECS awsvpc pattern. A Chromium
# compromise escapes into the sidecar (no OAuth keys, no SQLite, no env), not the
# gateway. See docs/threat-model.md.
#
# Image: published by release CI to ghcr.io/edictum-ai/captatum and
# ghcr.io/edictum-ai/captatum-browser. Set CAPTATUM_TAG to a release tag, or build
# locally:
#   CAPTATUM_TAG=dev docker compose -f deploy/docker-compose.yml build
#   docker compose -f deploy/docker-compose.yml up -d
# Logs: docker compose -f deploy/docker-compose.yml logs -f gateway
#
# Front the gateway with a Cloudflare Tunnel + Access app on /oauth/authorize*
# (the hosted flavor requires Cloudflare Access — see deploy/README.md). The
# gateway's published port is bound to 127.0.0.1 on the HOST so it is never
# exposed directly (the container itself binds 0.0.0.0; only the host publish is
# loopback).

services:
  gateway:
    image: ghcr.io/edictum-ai/captatum:${CAPTATUM_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      # Hosted flavor is required (config.ts defaults to local-binary, which the
      # HTTP listener refuses — HostedFlavorError). Set it here so a .env that
      # omits it can't crash the container.
      CAPTATUM_FLAVOR: "hosted"
      # The container must bind 0.0.0.0 so the published host port can reach it
      # (the HOST port publish below stays 127.0.0.1 — loopback on the host).
      HOST: "0.0.0.0"
      # Tier-3 renders in the sidecar over the SHARED loopback (the browser
      # service attaches to this gateway's network namespace).
      CAPTATUM_BROWSER_CDP_ENDPOINT: "http://127.0.0.1:9222"
      # Default SQLite store lives on the persistent volume (no external DB).
      CAPTATUM_SQLITE_PATH: "/data/captatum.sqlite"
    volumes:
      - captatum-data:/data
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  browser:
    image: ghcr.io/edictum-ai/captatum-browser:${CAPTATUM_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.browser
    # Share the gateway's network namespace so the gateway reaches the sidecar's
    # loopback-only CDP at 127.0.0.1:9222 (no ports/expose — same namespace).
    network_mode: "service:gateway"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  captatum-data:
